# LLM Provider Configuration (OpenAI API compatible only)
provider: "openai"  # Options: openai, vllm
model_name: "gpt-4"  # Model name for the selected provider

# API Configuration (uses environment variables if empty)
api_key: ''
api_base: ''  # Optional: custom API endpoint

# Generation Settings
temperature: 0.0
max_tokens: 500

# Reasoning Model Settings (for o1, o3, gpt-5.x models)
# Options: "low" (faster), "medium" (balanced), "high" (thorough but slower)
reasoning_effort: "low"

# Task Planning Settings
max_steps: 25
random_seed: 0
scoring_batch_size: 4
score_function: 'sum'
use_predefined_prompt: False
