# Default config — used when no --config-name is specified.
# Run with --config-name=config_alfred, config_alfred_gt, config_wah, etc.

name: alfred

defaults:
  - hydra: default.yaml
  - planner: default.yaml
  - override hydra/help: custom
  - _self_

out_dir: ${hydra:run.dir}

planner:
  provider: "openai"
  model_name: "gpt-4"

prompt:
  num_examples: 6
  splitter: ""
  prefix: "Robot: Hi there, I'm a robot operating in a home.\nRobot: You can ask me to do various tasks and I'll tell you the sequence of actions I would do to accomplish your task.\n"
  example_file_path: "resource/alfred_examples_for_prompt.json"

alfred:
  x_display: '0'
  eval_set: 'valid_seen'
  eval_portion_in_percent: 5
  random_seed_for_eval_subset: 1
